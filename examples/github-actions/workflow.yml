name: Notify QQ After CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        id: test
        run: go test ./...

      - name: Notify QQ on success
        if: success()
        env:
          QQ_APP_ID: ${{ secrets.QQ_APP_ID }}
          QQ_APP_SECRET: ${{ secrets.QQ_APP_SECRET }}
          QQ_USER_OPENID: ${{ secrets.QQ_USER_OPENID }}
        run: go run ./examples/github-actions

      - name: Notify QQ on failure through bridge payload
        if: failure()
        env:
          QQ_APP_ID: ${{ secrets.QQ_APP_ID }}
          QQ_APP_SECRET: ${{ secrets.QQ_APP_SECRET }}
          QQ_USER_OPENID: ${{ secrets.QQ_USER_OPENID }}
        run: |
          cat > /tmp/notify.go <<'EOF'
          package main

          import (
            "context"
            "log"
            "time"

            "github.com/wangyaxings/qqnotify-go/qqnotify"
          )

          func main() {
            cfg, err := qqnotify.LoadConfigFromEnv()
            if err != nil {
              log.Fatal(err)
            }

            client := qqnotify.NewClientWithOptions(cfg, nil, qqnotify.ClientOptions{
              RetryAttempts: 3,
              Timeout:       20 * time.Second,
            })

            ctx, cancel := context.WithTimeout(context.Background(), 20*time.Second)
            defer cancel()

            err = client.Send(ctx, qqnotify.NewCINotification(qqnotify.CITemplate{
              Workflow: "Notify QQ After CI",
              Job:      "build-and-notify",
              Status:   "failed",
              Summary:  "The workflow failed before completing all steps.",
              RunURL:   "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              TraceID:  "${{ github.run_id }}",
            }))
            if err != nil {
              log.Fatal(err)
            }
          }
          EOF
          go run /tmp/notify.go
